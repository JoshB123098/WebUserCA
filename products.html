<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Our Products</h1>
</header>

<!-- Add Product Form -->
<div class="form-wrapper">
  <h2>Add Product</h2>
  <input id="name" placeholder="Product name">
  <input id="price" type="number" placeholder="Price">
  <input id="image" placeholder="Image URL">
  <button onclick="addProduct()" class="btn">Add Product</button>
</div>

<!-- Products List -->
<div class="container" id="product-list"></div>

<script>
const SUPABASE_URL = "https://bsdgoexarvlafcehwdiq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZGdvZXhhcnZsYWZjZWh3ZGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzEzNzEsImV4cCI6MjA5MDY0NzM3MX0.7Hes-raxkjBBG0Cl0C8-dQT9GtiKp5lZIXkxASmGgb0";

async function getProducts() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();
  displayProducts(data);
}

function displayProducts(products) {
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <img src="${product.image_url || 'https://via.placeholder.com/250'}">
        <h3>${product.name}</h3>
        <p class="price">€${product.price}</p>
        <button class="btn" onclick="deleteProduct(${product.id})">Delete</button>
      </div>
    `;
  });
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;

  if (!name || !price) {
    alert("Fill all fields");
    return;
  }

  await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name: name,
      price: price,
      image_url: image
    })
  });

  getProducts();
}

async function deleteProduct(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  getProducts();
}

getProducts();
</script>

</body>
</html>
